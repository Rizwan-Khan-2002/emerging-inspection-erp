    <circle cx="28" cy="255" r="3"/><circle cx="28" cy="295" r="3"/><circle cx="28" cy="329" r="3"/>
    <circle cx="28" cy="363" r="3"/><circle cx="28" cy="403" r="3"/><circle cx="28" cy="437" r="3"/>
